<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="A 5-touch text-and-email re-engagement sequence shown on a phone">
  <defs>
    <linearGradient id="rBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF1FE"/><stop offset="1" stop-color="#D6E4FC"/>
    </linearGradient>
    <filter id="rSh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B2440" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="640" height="400" fill="url(#rBg)"/>
  <text x="44" y="60" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="27" font-weight="700" fill="#0B2440">Database Reactivation</text>
  <text x="44" y="88" font-family="'DM Sans',system-ui,sans-serif" font-size="16" fill="#52617A">Win back cold past clients</text>

  <!-- phone -->
  <g filter="url(#rSh)"><rect x="44" y="114" width="214" height="250" rx="28" fill="#FFFFFF" stroke="#DCE5F2" stroke-width="2"/></g>
  <rect x="118" y="130" width="66" height="9" rx="4.5" fill="#E2E8F2"/>
  <!-- incoming -->
  <rect x="64" y="158" width="120" height="36" rx="16" fill="#EEF2F8"/>
  <rect x="78" y="171" width="84" height="6" rx="3" fill="#C3CEDE"/><rect x="78" y="183" width="56" height="6" rx="3" fill="#C3CEDE"/>
  <!-- outgoing -->
  <rect x="118" y="206" width="120" height="36" rx="16" fill="#2563EB"/>
  <rect x="132" y="219" width="80" height="6" rx="3" fill="#BFD4FF"/><rect x="132" y="231" width="52" height="6" rx="3" fill="#BFD4FF"/>
  <!-- incoming -->
  <rect x="64" y="254" width="104" height="36" rx="16" fill="#EEF2F8"/>
  <rect x="78" y="267" width="66" height="6" rx="3" fill="#C3CEDE"/><rect x="78" y="279" width="42" height="6" rx="3" fill="#C3CEDE"/>
  <!-- input -->
  <rect x="64" y="318" width="148" height="26" rx="13" fill="#F2F5FA" stroke="#E2E8F2"/>
  <circle cx="224" cy="331" r="14" fill="#E6A93B"/><path d="M218 331l11-5-3 5 3 5z" fill="#FFFFFF"/>

  <!-- 5-touch sequence -->
  <text x="300" y="150" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="18" font-weight="700" fill="#0B2440">5 touches</text>
  <line x1="314" y1="178" x2="314" y2="350" stroke="#9DBBF4" stroke-width="2" stroke-dasharray="2 7" stroke-linecap="round"/>
  <g font-family="'DM Sans',system-ui,sans-serif" font-size="13" fill="#0B2440">
    <!-- node template: circle + type chip + label pill -->
    <g transform="translate(0,190)"><circle cx="314" cy="0" r="15" fill="#2563EB"/><text x="314" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">1</text><rect x="340" y="-15" width="258" height="30" rx="9" fill="#FFFFFF" stroke="#DCE5F2"/><rect x="352" y="-9" width="46" height="18" rx="9" fill="#E6A93B"/><text x="375" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#3A2A05">TEXT</text><text x="408" y="4">Still thinking of moving?</text></g>
    <g transform="translate(0,228)"><circle cx="314" cy="0" r="15" fill="#2563EB"/><text x="314" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">2</text><rect x="340" y="-15" width="258" height="30" rx="9" fill="#FFFFFF" stroke="#DCE5F2"/><rect x="352" y="-9" width="56" height="18" rx="9" fill="#DCE8FF"/><text x="380" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A78">EMAIL</text><text x="418" y="4">Your home's 2026 value</text></g>
    <g transform="translate(0,266)"><circle cx="314" cy="0" r="15" fill="#2563EB"/><text x="314" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">3</text><rect x="340" y="-15" width="258" height="30" rx="9" fill="#FFFFFF" stroke="#DCE5F2"/><rect x="352" y="-9" width="46" height="18" rx="9" fill="#E6A93B"/><text x="375" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#3A2A05">TEXT</text><text x="408" y="4">Quick market update</text></g>
    <g transform="translate(0,304)"><circle cx="314" cy="0" r="15" fill="#2563EB"/><text x="314" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">4</text><rect x="340" y="-15" width="258" height="30" rx="9" fill="#FFFFFF" stroke="#DCE5F2"/><rect x="352" y="-9" width="56" height="18" rx="9" fill="#DCE8FF"/><text x="380" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#1B3A78">EMAIL</text><text x="418" y="4">3 homes near you sold</text></g>
    <g transform="translate(0,342)"><circle cx="314" cy="0" r="15" fill="#2563EB"/><text x="314" y="5" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">5</text><rect x="340" y="-15" width="258" height="30" rx="9" fill="#FFFFFF" stroke="#DCE5F2"/><rect x="352" y="-9" width="46" height="18" rx="9" fill="#E6A93B"/><text x="375" y="4" text-anchor="middle" font-size="11" font-weight="700" fill="#3A2A05">TEXT</text><text x="408" y="4">Coffee this week?</text></g>
  </g>
</svg>
