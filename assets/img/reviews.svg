<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="A five-star Google review card next to a QR review card">
  <defs>
    <linearGradient id="vBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF1FE"/><stop offset="1" stop-color="#D6E4FC"/>
    </linearGradient>
    <filter id="vSh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0B2440" flood-opacity="0.18"/>
    </filter>
    <symbol id="star" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3 6.9.7-5.1 4.6 1.4 6.8L12 17.8 5.9 20.4l1.4-6.8L2.2 9l6.9-.7z" fill="#E6A93B"/></symbol>
  </defs>
  <rect width="640" height="400" fill="url(#vBg)"/>
  <text x="44" y="60" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="27" font-weight="700" fill="#0B2440">Review Booster</text>
  <text x="44" y="88" font-family="'DM Sans',system-ui,sans-serif" font-size="16" fill="#52617A">Turn happy clients into Google reviews</text>

  <!-- review card -->
  <g filter="url(#vSh)"><rect x="44" y="116" width="318" height="244" rx="20" fill="#FFFFFF" stroke="#DCE5F2" stroke-width="2"/></g>
  <!-- Google G badge -->
  <circle cx="84" cy="158" r="20" fill="#FFFFFF" stroke="#DCE5F2"/>
  <text x="84" y="166" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="22" font-weight="800" fill="#2563EB">G</text>
  <text x="116" y="152" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="16" font-weight="700" fill="#0B2440">Google review</text>
  <text x="116" y="172" font-family="'DM Sans',system-ui,sans-serif" font-size="13" fill="#7A879B">Verified client</text>
  <!-- stars -->
  <use href="#star" x="64" y="190" width="30" height="30"/><use href="#star" x="102" y="190" width="30" height="30"/><use href="#star" x="140" y="190" width="30" height="30"/><use href="#star" x="178" y="190" width="30" height="30"/><use href="#star" x="216" y="190" width="30" height="30"/>
  <!-- review text lines -->
  <rect x="64" y="240" width="278" height="9" rx="4.5" fill="#E2E8F2"/>
  <rect x="64" y="262" width="278" height="9" rx="4.5" fill="#E2E8F2"/>
  <rect x="64" y="284" width="190" height="9" rx="4.5" fill="#E2E8F2"/>
  <rect x="64" y="320" width="150" height="26" rx="13" fill="#2563EB"/>
  <text x="139" y="337" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Post review</text>

  <!-- QR review card -->
  <g filter="url(#vSh)"><rect x="392" y="140" width="200" height="200" rx="20" fill="#0B2440"/></g>
  <text x="492" y="178" text-anchor="middle" font-family="'Plus Jakarta Sans',system-ui,sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Scan to review</text>
  <!-- QR (decorative) -->
  <g fill="#FFFFFF" transform="translate(442,194)">
    <rect width="100" height="100" rx="10" fill="#FFFFFF"/>
    <g fill="#0B2440" transform="translate(10,10)">
      <path d="M0 0h26v26H0zM6 6v14h14V6z" /><path d="M54 0h26v26H54zM60 6v14h14V6z"/><path d="M0 54h26v26H0zM6 60v14h14V60z"/>
      <rect x="36" y="4" width="8" height="8"/><rect x="36" y="18" width="8" height="8"/><rect x="48" y="36" width="8" height="8"/><rect x="64" y="36" width="8" height="8"/><rect x="36" y="48" width="8" height="8"/><rect x="36" y="64" width="8" height="8"/><rect x="50" y="50" width="10" height="10"/><rect x="66" y="64" width="14" height="14"/><rect x="4" y="36" width="8" height="8"/><rect x="18" y="36" width="8" height="8"/>
    </g>
  </g>
  <text x="492" y="324" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#9DB3D6">Print on a leave-behind card</text>
</svg>
